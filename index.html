<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NowTech AI - Trade Offer Control</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f7fb;
}

/* LOGIN SCREEN */
#loginScreen {
  display: flex;
  height: 100vh;
  justify-content: center;
  align-items: center;
}

.login-box {
  background: white;
  padding: 30px;
  border-radius: 10px;
  width: 300px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  background: #2563eb;
  color: white;
  border: none;
  cursor: pointer;
}

/* APP */
#app {
  display: none;
  padding: 20px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h3>Login</h3>

    <input id="email" placeholder="Enter Email">

    <button onclick="sendCode()">Send Code</button>

    <input id="otp" placeholder="Enter 6 digit code">

    <button onclick="verifyCode()">Verify</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <h2>Trade Offer App</h2>
  <p id="userEmail"></p>

  <button onclick="createOffer()">Create Offer</button>

  <div id="offers"></div>
</div>

<script>

let generatedOTP = "";
let loggedInUser = "";

/* SEND OTP */
async function sendCode() {
  const email = document.getElementById("email").value;

  generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();

  await fetch('/api/send-approval', {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      type: "otp",
      email: email,
      otp: generatedOTP
    })
  });

  alert("OTP sent to email");
}

/* VERIFY */
function verifyCode() {
  const entered = document.getElementById("otp").value;

  if (entered === generatedOTP) {
    loggedInUser = document.getElementById("email").value;

    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("app").style.display = "block";

    document.getElementById("userEmail").innerText = "Logged in as: " + loggedInUser;

  } else {
    alert("Wrong OTP");
  }
}

/* CREATE OFFER */
function createOffer() {
  const offer = {
    id: "OFF-" + Math.random().toString(36).substring(2,7),
    createdBy: loggedInUser,
    status: "Pending"
  };

  let offers = JSON.parse(localStorage.getItem("offers") || "[]");
  offers.push(offer);
  localStorage.setItem("offers", JSON.stringify(offers));

  renderOffers();
}

/* RENDER */
function renderOffers() {
  let offers = JSON.parse(localStorage.getItem("offers") || "[]");

  let html = "";

  offers.forEach(o => {

    html += `
      <div style="background:white;padding:10px;margin:10px">
        ${o.id} | ${o.status}
        
        ${o.createdBy !== loggedInUser ? `
          <button onclick="approve('${o.id}')">Approve</button>
        ` : ''}
      </div>
    `;
  });

  document.getElementById("offers").innerHTML = html;
}

/* APPROVE */
function approve(id) {
  let offers = JSON.parse(localStorage.getItem("offers") || "[]");

  offers = offers.map(o => {
    if (o.id === id) o.status = "Approved";
    return o;
  });

  localStorage.setItem("offers", JSON.stringify(offers));

  renderOffers();
}

/* LOAD */
renderOffers();

</script>

</body>
</html>
