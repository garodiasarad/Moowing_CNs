<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NowTech AI - Trade Offer Control</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
}

/* LOGIN SCREEN */
#loginScreen {
  display: flex;
  height: 100vh;
  justify-content: center;
  align-items: center;
}

.login-box {
  background: white;
  padding: 30px;
  border-radius: 10px;
  width: 320px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  box-sizing: border-box;
}

button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  background: #2563eb;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 6px;
}

button.small {
  width: auto;
  padding: 8px 12px;
  margin-right: 6px;
}

#app {
  display: none;
  padding: 20px;
}

.offer-card {
  background: white;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.06);
}
</style>
</head>

<body>

<div id="loginScreen">
  <div class="login-box">
    <h3>Login</h3>
    <input id="email" type="email" placeholder="Enter Email">
    <button onclick="sendCode()">Send Code</button>

    <input id="otp" placeholder="Enter 6 digit code">
    <button onclick="verifyCode()">Verify</button>
  </div>
</div>

<div id="app">
  <h2>Trade Offer App</h2>
  <p id="userEmail"></p>
  <button onclick="createOffer()">Create Offer</button>
  <div id="offers"></div>
</div>

<script>
const SUPABASE_URL = "https://ivhczivvmepfzydwmxqf.supabase.co";
const SUPABASE_KEY = "sb_publishable_grtvVAM8anWtNIsgfALv_w_bw1qSev-";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let generatedOTP = "";
let loggedInUser = "";

/* SEND OTP */
async function sendCode() {
  const email = document.getElementById("email").value.trim();

  if (!email) {
    alert("Enter email");
    return;
  }

  const response = await fetch('/api/send-otp', {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email })
  });

  const result = await response.json();

  if (!response.ok) {
    alert(result.error || "Failed to send OTP");
    return;
  }

  alert("OTP sent to email");
}

/* VERIFY OTP */
async function verifyCode() {
  const email = document.getElementById("email").value.trim();
  const code = document.getElementById("otp").value.trim();

  if (!email || !code) {
    alert("Enter email and code");
    return;
  }

  const response = await fetch('/api/verify-otp', {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, code })
  });

  const result = await response.json();

  if (!response.ok) {
    alert(result.error || "Wrong OTP");
    return;
  }

  loggedInUser = result.user.email;
  sessionStorage.setItem("loggedInUser", loggedInUser);

  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("userEmail").innerText = "Logged in as: " + loggedInUser;

  loadOffers();
}

/* CREATE OFFER */
async function createOffer() {
  const offer = {
    id: "OFF-" + Math.random().toString(36).substring(2, 7).toUpperCase(),
    customer: "Reliance Retail",
    sku: "Sample SKU",
    offer_price: 100,
    status: "Pending",
    created_by: loggedInUser
  };

  const { error } = await supabase.from('offers').insert([offer]);

  if (error) {
    alert("Create failed: " + error.message);
    return;
  }

  loadOffers();
}

/* LOAD OFFERS */
async function loadOffers() {
  const { data, error } = await supabase
    .from('offers')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) {
    alert("Load failed: " + error.message);
    return;
  }

  let html = "";

  data.forEach(o => {
    html += `
      <div class="offer-card">
        <b>${o.id}</b> | ${o.customer} | ${o.sku} | ₹${o.offer_price} | ${o.status}
        <br><small>Created by: ${o.created_by || ""}</small>
        <div style="margin-top:8px;">
          ${o.created_by !== loggedInUser && o.status !== "Approved" ? `
            <button class="small" onclick="approve('${o.id}')">Approve</button>
          ` : ''}
        </div>
      </div>
    `;
  });

  document.getElementById("offers").innerHTML = html || "<p>No offers found.</p>";
}

/* APPROVE OFFER */
async function approve(id) {
  const { error } = await supabase
    .from('offers')
    .update({ status: "Approved" })
    .eq('id', id);

  if (error) {
    alert("Approve failed: " + error.message);
    return;
  }

  loadOffers();
}

/* CHECK SESSION */
window.onload = function () {
  const savedUser = sessionStorage.getItem("loggedInUser");

  if (savedUser) {
    loggedInUser = savedUser;
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("userEmail").innerText = "Logged in as: " + loggedInUser;
    loadOffers();
  }
};
</script>

</body>
</html>
